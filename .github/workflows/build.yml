name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform linux/amd64 -ldflags "-X main.AppVersion=${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-vless-client-linux-amd64
          path: build/bin/go-vless-client

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Read version
        id: version
        run: echo "value=$(Get-Content VERSION).Trim()" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -nsis -ldflags "-X main.AppVersion=${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-vless-client-windows-amd64
          path: build/bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: go-vless-client-linux-amd64
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: go-vless-client-windows-amd64
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
